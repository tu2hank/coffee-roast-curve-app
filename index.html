<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6f4328">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="烘豆曲線">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>烘豆曲線紀錄</title>
  <link rel="manifest" href="./manifest.json?v=chart-readable-v5">
  <link rel="icon" href="./assets/icons/coffee-bean-icon.png?v=bean-gen-1" type="image/png">
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png?v=bean-gen-1">
  <style>
    :root {
      color-scheme: light;
      --ink: #30251d;
      --muted: #7b7068;
      --line: #ded2c3;
      --paper: #f4efe7;
      --panel: #fffaf2;
      --accent: #6f4328;
      --accent-dark: #4d2d1b;
      --green: #65745a;
      --red: #9b3f32;
      --blue: #4f6670;
      --shadow: 0 10px 28px rgba(65, 43, 28, 0.08);
    }

    * { box-sizing: border-box; }

    html,
    body {
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    main {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
      overflow-x: hidden;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 22px;
      max-width: 100%;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .title-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      vertical-align: middle;
      margin-right: 10px;
    }

    .title-line {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions,
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .actions {
      justify-content: flex-end;
      min-width: 0;
      max-width: 100%;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 15px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
    }

    button:hover { border-color: var(--accent); }

    .primary { background: var(--accent); color: #fff; }
    .primary:hover { background: var(--accent-dark); }
    .secondary { background: #f2f5ee; color: var(--green); border-color: #cad4c0; }
    .ghost { background: #fbf4e9; color: var(--accent-dark); border-color: #dcc7ad; }
    .danger { background: #faf0ec; color: var(--red); border-color: #e2b8ad; }

    section {
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 15px 20px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.4;
    }

    .content {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }

    label {
      display: grid;
      gap: 6px;
      color: #4a3d34;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-width: 0;
      border: 1px solid #cdbfaf;
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      color: var(--ink);
      background: #fffdf8;
    }

    input,
    select { min-height: 42px; }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: 3px solid rgba(111, 67, 40, 0.16);
      border-color: var(--accent);
    }

    .chart {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      height: 560px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
    }

    .single-chart {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      height: 440px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
    }

    .chart-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .checkline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      color: #4a3d34;
    }

    .checkline input {
      width: 18px;
      min-height: 18px;
      height: 18px;
    }

    .metrics,
    .batch-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .metric,
    .batch-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      padding: 12px;
    }

    .batch-card {
      border-top: 5px solid var(--batch-color, var(--accent));
    }

    .batch-card strong,
    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
      color: var(--accent-dark);
    }

    .metric span,
    .batch-card span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .summary-board {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    .summary-board h3 {
      margin: 0;
      font-size: 18px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      overflow: hidden;
    }

    .summary-card h4 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f7efe4;
      color: var(--accent-dark);
      font-size: 15px;
      line-height: 1.3;
    }

    .summary-list {
      display: grid;
      width: 100%;
      font-size: 13px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 1.15fr repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
    }

    .summary-row:last-child {
      border-bottom: 0;
    }

    .summary-cell {
      text-align: center;
      padding: 9px 8px;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      min-width: 0;
      border-left: 1px solid var(--line);
    }

    .summary-cell:first-child {
      text-align: left;
      font-weight: 700;
      color: #4a3d34;
      background: #fbf6ee;
      border-left: 0;
    }

    .summary-head .summary-cell {
      color: #5d5148;
      background: #f6efe6;
      font-weight: 800;
    }

    .summary-table-wrap {
      width: 100%;
    }

    .tabs {
      padding: 14px 18px 0;
    }

    .tab {
      background: #fbf6ee;
      color: #65594f;
      border-color: var(--line);
    }

    .tab.active {
      background: #f7efe4;
      color: var(--accent-dark);
      border-color: var(--accent);
    }

    .batch-panel {
      display: none;
      padding: 18px;
    }

    .batch-panel.active {
      display: grid;
      gap: 16px;
    }

    .subsection {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fffdf8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .table-scroll { overflow-x: auto; }

    .log-table { min-width: 1220px; }
    .compare-table { min-width: 980px; }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #5d5148;
      background: #f6efe6;
      font-size: 13px;
      white-space: nowrap;
    }

    td input {
      min-height: 38px;
      padding: 8px 10px;
    }

    .icon-button {
      width: 38px;
      min-height: 38px;
      padding: 0;
      background: #fbf6ee;
      color: var(--muted);
      border-color: var(--line);
    }

    .icon-button:hover {
      color: var(--red);
      border-color: #fecdd3;
      background: #faf0ec;
    }

    .status {
      min-height: 22px;
      color: var(--green);
      font-size: 14px;
      line-height: 1.5;
    }

    .history-panel {
      display: none;
    }

    .history-panel.active {
      display: block;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      padding: 12px;
    }

    .history-title {
      font-weight: 800;
      color: var(--accent-dark);
      overflow-wrap: anywhere;
    }

    .history-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 980px) {
      header { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .span-3,
      .span-4 { grid-column: span 2; }
      .metrics,
      .batch-cards,
      .summary-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      main {
        width: min(100vw - 20px, 620px);
        padding-top: 12px;
      }

      h1 { font-size: 28px; }
      .grid { grid-template-columns: 1fr; }
      .span-2,
      .span-3,
      .span-4 { grid-column: auto; }
      .chart { height: 460px; }
      .single-chart { height: 400px; }
    }

    @media print {
      @page { size: A4 landscape; margin: 10mm; }
      body { background: #fff; }
      main { width: auto; padding: 0; }
      .actions,
      .tabs,
      .icon-button,
      .add-row,
      .status { display: none !important; }
      section { box-shadow: none; break-inside: avoid; margin-bottom: 12px; }
      table { page-break-inside: auto; }
      tr { break-inside: avoid; page-break-inside: avoid; }
      thead { display: table-header-group; }
      .table-scroll { overflow: visible; }
      .summary-grid { grid-template-columns: 1fr; }
      .summary-card { break-inside: avoid; page-break-inside: avoid; }
      .summary-list { font-size: 11px; }
      .summary-cell { padding: 6px 5px; }
      .after-drop { display: none !important; }
      .batch-panel { display: grid !important; }
      .chart { height: 450px; }
      .single-chart { height: 390px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1 class="title-line"><img class="title-mark" src="./assets/icons/coffee-bean-icon.png?v=bean-gen-1" alt="">烘豆曲線紀錄</h1>
        <p class="subtitle">同一支豆子可記錄 2-3 鍋不同烘法，疊加曲線並搭配杯測結果，判斷最適合的烘焙策略。</p>
      </div>
      <div class="actions">
        <a class="ghost" href="./mobile.html?v=chart-readable-v5" style="min-height:40px;border:1px solid #dcc7ad;border-radius:8px;padding:0 15px;font:inherit;font-weight:700;display:inline-flex;align-items:center;text-decoration:none;color:var(--accent-dark);background:#fbf4e9;">手機板</a>
        <button class="secondary" id="save-record-button" type="button">保存本次紀錄</button>
        <button class="ghost" id="history-toggle-button" type="button">查看前次紀錄</button>
        <button class="danger" id="clear-button" type="button">⌫ 清除數據</button>
        <button class="secondary" id="export-button" type="button">⇩ 匯出 Excel</button>
        <button class="primary" id="print-button" type="button">⎙ 列印 / PDF</button>
      </div>
    </header>

    <div class="stack">
      <section aria-labelledby="bean-title">
        <div class="section-head">
          <h2 id="bean-title">豆子與試烘目標</h2>
          <div class="status" id="status">已自動保存到此瀏覽器。</div>
        </div>
        <div class="content grid">
          <label>試烘日期
            <input id="date" data-field="bean.date" type="date">
          </label>
          <label class="span-2">生豆品項
            <input id="beanItem" data-field="bean.beanItem" type="text" placeholder="例如：衣索比亞 耶加雪菲 水洗">
          </label>
          <label>處理法
            <input id="process" data-field="bean.process" type="text" placeholder="水洗 / 日曬 / 蜜處理">
          </label>
          <label class="span-4">假設條件
            <textarea id="hypothesis" data-field="bean.hypothesis"></textarea>
          </label>
        </div>
      </section>

      <section class="history-panel" id="history-panel" aria-labelledby="history-title">
        <div class="section-head">
          <h2 id="history-title">已保存紀錄</h2>
          <div class="status" id="history-status">每台裝置與每個瀏覽器各自保存，不會覆蓋朋友的紀錄。</div>
        </div>
        <div class="content">
          <div class="history-list" id="history-list"></div>
        </div>
      </section>

      <section aria-labelledby="chart-title">
        <div class="section-head">
          <h2 id="chart-title">多鍋烘焙曲線比較</h2>
          <div class="chart-tools" id="chart-toggles"></div>
        </div>
        <div class="content">
          <svg class="chart" id="chart" viewBox="0 0 980 540" role="img" aria-label="多鍋烘焙曲線比較圖"></svg>
          <div class="batch-cards" id="batch-cards" style="margin-top: 14px;"></div>
          <div class="summary-board" id="roast-summary" aria-live="polite"></div>
        </div>
      </section>

      <section aria-labelledby="batch-title">
        <div class="section-head">
          <h2 id="batch-title">各鍋烘焙紀錄</h2>
        </div>
        <div class="tabs" id="batch-tabs"></div>
        <div id="batch-panels"></div>
      </section>

      <section aria-labelledby="cupping-title">
        <div class="section-head">
          <h2 id="cupping-title">杯測比較與結論</h2>
        </div>
        <div class="content stack">
          <div class="table-scroll">
            <table class="compare-table">
              <thead>
                <tr>
                  <th>鍋次</th>
                  <th>乾香 / 濕香</th>
                  <th>酸質</th>
                  <th>甜感</th>
                  <th>醇厚度</th>
                  <th>餘韻</th>
                  <th>整體分數</th>
                  <th>判斷</th>
                </tr>
              </thead>
              <tbody id="cupping-body"></tbody>
            </table>
          </div>
          <div class="grid">
            <label>最適合烘法
              <select id="winner" data-field="decision.winner">
                <option value="">尚未決定</option>
                <option value="0">第 1 鍋</option>
                <option value="1">第 2 鍋</option>
                <option value="2">第 3 鍋</option>
              </select>
            </label>
            <label class="span-3">結論與下次調整
              <textarea id="conclusion" data-field="decision.conclusion" placeholder="寫下哪一鍋最適合這支豆子，以及下一次要保留或調整的做法。"></textarea>
            </label>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "coffee-roast-compare-v2";
    const HISTORY_KEY = "coffee-roast-history-v1";
    const colors = ["#7b4a2c", "#2f7d62", "#2f5f9e"];
    const milestoneNames = ["入豆", "回溫點", "轉黃", "肉桂色", "一爆開始", "一爆結束", "下豆"];
    const beanFields = ["date", "beanItem", "process", "hypothesis"];
    const batchFields = ["name", "enabled", "strategy", "targetRoast", "greenWeight", "roastedWeight", "heatPlan", "damperPlan", "drumSpeed", "actualRoast", "roaster", "operator"];
    const cuppingScoreFields = ["aroma", "acidity", "sweetness", "bodyFeel", "finish"];
    const cuppingFields = [...cuppingScoreFields, "score", "judgement"];
    const MAX_CHART_TIME = 13 * 60;

    function today() {
      return new Date().toLocaleDateString("en-CA");
    }

    function formatDuration(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "--";
      const mins = Math.floor(seconds / 60);
      const secs = Math.round(seconds % 60);
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function parseTimeToSeconds(value) {
      const text = String(value || "").trim();
      if (!text) return null;
      const parts = text.split(":").map(Number);
      if (parts.some(Number.isNaN)) return null;
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      return null;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function csvValue(value) {
      const text = String(value ?? "");
      return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function xlsCell(value, className = "") {
      return `<td class="${className}">${escapeHtml(value ?? "")}</td>`;
    }

    function xlsHeader(values) {
      return `<tr>${values.map((value) => `<th>${escapeHtml(value)}</th>`).join("")}</tr>`;
    }

    function xlsRows(rows) {
      return rows.map((row) => `<tr>${row.map((value) => xlsCell(value)).join("")}</tr>`).join("");
    }

    function xlsSection(title, columns, rows, batchIndex = null) {
      const batchClass = Number.isInteger(batchIndex) ? ` batch-${batchIndex}` : "";
      return `
        <tr><td class="section${batchClass}" colspan="${Math.max(columns.length, 2)}">${escapeHtml(title)}</td></tr>
        ${columns.length ? xlsHeader(columns) : ""}
        ${xlsRows(rows)}
        <tr class="gap"><td colspan="${Math.max(columns.length, 2)}"></td></tr>
      `;
    }

    function downloadWorkbook(filename, bodyRows) {
      const html = `<!doctype html>
        <html><head><meta charset="utf-8">
        <style>
          body { font-family: "Microsoft JhengHei", Arial, sans-serif; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid #d9c7b8; padding: 6px 8px; font-size: 12px; vertical-align: middle; text-align: center; mso-number-format:"\\@"; }
          th { background: #f3e6d8; font-weight: 700; text-align: center; }
          .title { background: #8a4b20; color: #fff; font-size: 18px; font-weight: 800; text-align: center; }
          .section { background: #d97706; color: #fff; font-weight: 800; font-size: 14px; }
          .batch-0 { background: #dbeafe; color: #1e3a8a; }
          .batch-1 { background: #dcfce7; color: #14532d; }
          .batch-2 { background: #fee2e2; color: #991b1b; }
          .gap td, tr.gap td { border: 0; height: 12px; }
        </style></head><body><table>
        <colgroup>${Array.from({ length: 10 }, () => "<col style='width:120px'>").join("")}</colgroup>
        ${bodyRows}</table></body></html>`;
      const blob = new Blob(["\uFEFF", html], { type: "application/vnd.ms-excel;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function scoreOptions(value) {
      return `<option value=""></option>${Array.from({ length: 10 }, (_, index) => {
        const score = String(index + 1);
        return `<option value="${score}" ${String(value || "") === score ? "selected" : ""}>${score}</option>`;
      }).join("")}`;
    }

    function getInitialLogs() {
      return Array.from({ length: 27 }, (_, index) => ({
        time: formatDuration(index * 30),
        temp: "",
        ror: "",
        stage: index === 0 ? "入豆" : "",
        stageTime: index === 0 ? "00:00" : "",
        exactTemp: "",
        note: ""
      }));
    }

    function getInitialMilestones() {
      return milestoneNames.map((name) => ({ name, time: name === "入豆" ? "00:00" : "", exactTemp: "", temp: "", note: "" }));
    }

    function createBatch(index) {
      return {
        name: `第 ${index + 1} 鍋`,
        enabled: index < 2,
        strategy: "",
        targetRoast: "",
        greenWeight: "",
        roastedWeight: "",
        heatPlan: "",
        damperPlan: "",
        drumSpeed: "",
        actualRoast: "",
        roaster: "",
        operator: "",
        milestones: getInitialMilestones(),
        logs: getInitialLogs(),
        cupping: Object.fromEntries(cuppingFields.map((field) => [field, ""]))
      };
    }

    function createState() {
      return {
        bean: {
          date: today(),
          beanItem: "",
          process: "",
          hypothesis: ""
        },
        batches: [createBatch(0), createBatch(1), createBatch(2)],
        activeBatch: 0,
        decision: {
          winner: "",
          conclusion: ""
        }
      };
    }

    let state = createState();

    const status = document.querySelector("#status");
    const chart = document.querySelector("#chart");
    const batchTabs = document.querySelector("#batch-tabs");
    const batchPanels = document.querySelector("#batch-panels");
    const batchCards = document.querySelector("#batch-cards");
    const roastSummary = document.querySelector("#roast-summary");
    const cuppingBody = document.querySelector("#cupping-body");

    function normalizeState(saved) {
      const fresh = createState();
      if (!saved || typeof saved !== "object") return fresh;
      return {
        bean: Object.fromEntries(beanFields.map((field) => [field, saved.bean?.[field] ?? fresh.bean[field]])),
        batches: fresh.batches.map((batch, index) => {
          const normalized = {
            ...batch,
            ...(saved.batches?.[index] || {}),
            strategy: normalizeStrategy(saved.batches?.[index]?.strategy || batch.strategy),
            milestones: normalizeMilestones(saved.batches?.[index]?.milestones, batch.milestones),
            logs: normalizeLogs(saved.batches?.[index]?.logs, batch.logs),
            cupping: { ...batch.cupping, ...(saved.batches?.[index]?.cupping || {}) }
          };
          syncMilestonesFromLogs(normalized);
          return normalized;
        }),
        activeBatch: Number.isInteger(saved.activeBatch) ? Math.max(0, Math.min(2, saved.activeBatch)) : fresh.activeBatch,
        decision: { ...fresh.decision, ...(saved.decision || {}) }
      };
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderChart();
      renderSingleBatchCharts();
      updateAutoRorFields();
      renderBatchCards();
      renderRoastSummary();
      status.textContent = "已自動保存到此瀏覽器。";
    }

    function load() {
      try {
        state = normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"));
      } catch {
        state = createState();
        status.textContent = "讀取舊紀錄失敗，已使用空白表單。";
      }
    }

    function normalizeMilestones(savedMilestones, freshMilestones) {
      if (!Array.isArray(savedMilestones)) return freshMilestones;
      return freshMilestones.map((fresh) => {
        const saved = savedMilestones.find((item) => item?.name === fresh.name);
        const merged = { ...fresh, ...(saved || {}) };
        if (merged.name === "入豆" && !merged.time) merged.time = "00:00";
        return merged;
      });
    }

    function normalizeStrategy(value) {
      return ["基準烘法", "調整烘法", "備用烘法"].includes(value) ? "" : value;
    }

    function normalizeLogs(savedLogs, freshLogs) {
      if (!Array.isArray(savedLogs)) return freshLogs;
      const logs = savedLogs.filter((log) => {
        const time = parseTimeToSeconds(log?.time);
        return Number.isFinite(time) && time <= MAX_CHART_TIME;
      }).map((log) => {
        const stage = log.stage || (milestoneNames.includes(log.note) ? log.note : "");
        return {
          time: log.time || "",
        temp: log.temp || "",
        ror: log.ror || "",
        stage,
        stageTime: log.stageTime || (stage ? log.time || "" : ""),
        exactTemp: log.exactTemp || log.exactTime || "",
        note: stage && log.note === stage ? "" : log.note || ""
      };
      });
      return logs.length ? logs : freshLogs;
    }

    function getLossRate(batch) {
      const green = Number(batch.greenWeight);
      const roasted = Number(batch.roastedWeight);
      if (!green || !roasted || roasted > green) return "";
      return (((green - roasted) / green) * 100).toFixed(1);
    }

    function getDevelopmentTime(batch) {
      return formatDuration(getDevelopmentSeconds(batch));
    }

    function getHighestTemp(batch) {
      const temps = batch.logs.map((log) => Number(log.temp)).filter((temp) => Number.isFinite(temp) && temp > 0);
      return temps.length ? `${Math.max(...temps).toFixed(1)}°C` : "--";
    }

    function getBatchLabel(batch, index) {
      return batch.name || `第 ${index + 1} 鍋`;
    }

    function formatTempValue(temp) {
      if (!Number.isFinite(temp) || temp <= 0) return "--";
      return `${temp.toFixed(temp % 1 ? 1 : 0)}°C`;
    }

    function getStageSummary(batch, stageName) {
      const point = getStagePoint(batch, stageName);
      return point || { time: null, temp: null };
    }

    function getStageTempText(batch, stageName) {
      return formatTempValue(getStageSummary(batch, stageName).temp);
    }

    function getStageTimeTempText(batch, stageName) {
      const point = getStageSummary(batch, stageName);
      const time = formatDuration(point.time);
      const temp = formatTempValue(point.temp);
      if (time === "--" && temp === "--") return "--";
      if (time === "--") return temp;
      if (temp === "--") return time;
      return `${time} / ${temp}`;
    }

    function getDropSeconds(batch) {
      return getMilestoneTime(batch, "下豆");
    }

    function getDevelopmentSeconds(batch) {
      const dropTime = getMilestoneTime(batch, "下豆");
      const firstCrackTime = getMilestoneTime(batch, "一爆開始");
      if (!Number.isFinite(dropTime) || !Number.isFinite(firstCrackTime)) return NaN;
      return dropTime - firstCrackTime;
    }

    function getDevelopmentRatio(batch) {
      const developmentSeconds = getDevelopmentSeconds(batch);
      const dropSeconds = getDropSeconds(batch);
      if (!Number.isFinite(developmentSeconds) || !Number.isFinite(dropSeconds) || dropSeconds <= 0) return "";
      return `${((developmentSeconds / dropSeconds) * 100).toFixed(1)}%`;
    }

    function getDevelopmentSummary(batch) {
      const duration = formatDuration(getDevelopmentSeconds(batch));
      const ratio = getDevelopmentRatio(batch);
      return ratio ? `${duration}（${ratio}）` : duration;
    }

    function getDurationBetween(batch, startStage, endStage) {
      const startTime = getMilestoneTime(batch, startStage);
      const endTime = getMilestoneTime(batch, endStage);
      if (!Number.isFinite(startTime) || !Number.isFinite(endTime)) return NaN;
      return endTime - startTime;
    }

    function getTemperatureDevelopmentText(batch) {
      const firstCrackTemp = getStageSummary(batch, "一爆開始").temp;
      const dropTemp = getStageSummary(batch, "下豆").temp;
      if (!Number.isFinite(firstCrackTemp) || !Number.isFinite(dropTemp)) return "--";
      const diff = dropTemp - firstCrackTemp;
      const sign = diff >= 0 ? "+" : "";
      return `${formatTempValue(firstCrackTemp)} → ${formatTempValue(dropTemp)}（${sign}${diff.toFixed(diff % 1 ? 1 : 0)}°C）`;
    }

    function compareBySeconds(batchIndex, getter, longText, middleText, shortText) {
      const values = state.batches.map((batch) => getter(batch));
      const current = values[batchIndex];
      const finiteValues = values.filter(Number.isFinite);
      if (!Number.isFinite(current) || finiteValues.length < 2) return "--";
      const min = Math.min(...finiteValues);
      const max = Math.max(...finiteValues);
      if (min === max) return "相同";
      if (current === max) return longText;
      if (current === min) return shortText;
      return middleText;
    }

    function getRorSamples(batch) {
      const turningPointTime = getMilestoneTime(batch, "回溫點");
      return batch.logs
        .map((log) => ({
          time: parseTimeToSeconds(log.time),
          temp: Number(log.temp)
        }))
        .filter((point) => Number.isFinite(point.time) && Number.isFinite(point.temp) && point.temp > 0)
        .sort((a, b) => a.time - b.time)
        .map((point, index, points) => {
          const previous = points[index - 1];
          if (!previous || point.time <= previous.time) return null;
          if (Number.isFinite(turningPointTime) && point.time <= turningPointTime) return null;
          return {
            time: point.time,
            value: ((point.temp - previous.temp) / (point.time - previous.time)) * 60
          };
        })
        .filter((point) => point && Number.isFinite(point.value));
    }

    function formatRorValue(value) {
      return Number.isFinite(value) ? `約 ${Math.round(value)}` : "--";
    }

    function getRorNearStage(batch, stageName) {
      const stageTime = getMilestoneTime(batch, stageName);
      if (!Number.isFinite(stageTime)) return "--";
      const samples = getRorSamples(batch);
      if (!samples.length) return "--";
      const nearest = samples.reduce((best, sample) => {
        const bestDistance = Math.abs(best.time - stageTime);
        const sampleDistance = Math.abs(sample.time - stageTime);
        return sampleDistance < bestDistance ? sample : best;
      }, samples[0]);
      return formatRorValue(nearest.value);
    }

    function getLowestRorInRange(batch, startStage, endStage) {
      const startTime = getMilestoneTime(batch, startStage);
      const endTime = getMilestoneTime(batch, endStage);
      if (!Number.isFinite(startTime) || !Number.isFinite(endTime) || endTime <= startTime) return "--";
      const values = getRorSamples(batch)
        .filter((sample) => sample.time >= startTime && sample.time <= endTime)
        .map((sample) => sample.value);
      return values.length ? formatRorValue(Math.min(...values)) : "--";
    }

    function getNextLogTime(batch) {
      const lastSeconds = [...batch.logs]
        .reverse()
        .map((log) => parseTimeToSeconds(log.time))
        .find((seconds) => Number.isFinite(seconds));
      const nextSeconds = Number.isFinite(lastSeconds) ? lastSeconds + 30 : 0;
      return nextSeconds <= MAX_CHART_TIME ? formatDuration(nextSeconds) : "";
    }

    function getAutoRor(batch, logIndex) {
      const current = batch.logs[logIndex];
      const currentTime = parseTimeToSeconds(current?.time);
      const currentTemp = Number(current?.temp);
      if (!Number.isFinite(currentTime) || !Number.isFinite(currentTemp) || currentTemp <= 0) return "";
      const turningPointTime = getMilestoneTime(batch, "回溫點");
      if (!Number.isFinite(turningPointTime) || currentTime <= turningPointTime) return "";

      const previous = [...batch.logs]
        .slice(0, logIndex)
        .reverse()
        .find((log) => {
          const time = parseTimeToSeconds(log.time);
          return Number.isFinite(time) &&
            (!Number.isFinite(turningPointTime) || time >= turningPointTime) &&
            Number.isFinite(Number(log.temp)) &&
            Number(log.temp) > 0;
        });
      const previousTime = parseTimeToSeconds(previous?.time);
      const previousTemp = Number(previous?.temp);
      if (!Number.isFinite(previousTime) || previousTime >= currentTime || !Number.isFinite(previousTemp)) return "";

      return (currentTemp - previousTemp).toFixed(1);
    }

    function getMilestoneTime(batch, name) {
      const logStage = batch.logs.find((log) => log.stage === name);
      const logStageTime = parseTimeToSeconds(logStage?.stageTime || logStage?.time);
      if (Number.isFinite(logStageTime)) return logStageTime;
      const milestone = batch.milestones.find((item) => item.name === name);
      return parseTimeToSeconds(milestone?.time);
    }

    function syncLogStageTime(batch, logIndex) {
      const log = batch.logs[logIndex];
      if (!log || !log.stage) return;
      if (!log.stageTime) log.stageTime = log.time || "";
      const milestone = batch.milestones.find((item) => item.name === log.stage);
      if (milestone) {
        milestone.time = log.stageTime || log.time || "";
        milestone.exactTemp = log.exactTemp || log.exactTime || "";
        milestone.temp = log.exactTemp || log.exactTime || log.temp || "";
      }
    }

    function syncMilestonesFromLogs(batch) {
      batch.logs
        .filter((log) => log.stage)
        .sort((a, b) => (parseTimeToSeconds(a.stageTime || a.time) ?? 0) - (parseTimeToSeconds(b.stageTime || b.time) ?? 0))
        .forEach((log) => {
          const milestone = batch.milestones.find((item) => item.name === log.stage);
          if (!milestone) return;
          milestone.time = log.stageTime || log.time || "";
          milestone.exactTemp = log.exactTemp || log.exactTime || "";
          milestone.temp = log.exactTemp || log.exactTime || log.temp || "";
        });
    }

    function updateAutoRorFields() {
      document.querySelectorAll("[data-ror]").forEach((node) => {
        const batchIndex = Number(node.dataset.ror);
        const logIndex = Number(node.dataset.index);
        node.value = getAutoRor(state.batches[batchIndex], logIndex);
      });
    }

    function renderBeanFields() {
      beanFields.forEach((field) => {
        const node = document.querySelector(`[data-field="bean.${field}"]`);
        if (node) node.value = state.bean[field] || "";
      });
      document.querySelector(`[data-field="decision.winner"]`).value = state.decision.winner;
      document.querySelector(`[data-field="decision.conclusion"]`).value = state.decision.conclusion;
    }

    function renderChartToggles() {
      document.querySelector("#chart-toggles").innerHTML = state.batches.map((batch, index) => `
        <label class="checkline" style="--batch-color: ${colors[index]}">
          <input type="checkbox" data-batch-enabled="${index}" ${batch.enabled ? "checked" : ""}>
          <span style="color: ${colors[index]}">${escapeHtml(batch.name || `第 ${index + 1} 鍋`)}</span>
        </label>
      `).join("");
    }

    function renderBatchTabs() {
      batchTabs.innerHTML = state.batches.map((batch, index) => `
        <button class="tab ${state.activeBatch === index ? "active" : ""}" type="button" data-tab="${index}" style="border-color:${state.activeBatch === index ? colors[index] : ""}">
          ${escapeHtml(batch.name || `第 ${index + 1} 鍋`)}
        </button>
      `).join("");
    }

    function renderBatchPanels() {
      batchPanels.innerHTML = state.batches.map((batch, index) => `
        <div class="batch-panel ${state.activeBatch === index ? "active" : ""}" data-panel="${index}">
          <div class="subsection">
            <h3 style="color:${colors[index]}">${escapeHtml(batch.name || `第 ${index + 1} 鍋`)}：烘法設定</h3>
            <div class="grid">
              <label>鍋次名稱
                <input data-batch="${index}" data-batch-field="name" value="${escapeHtml(batch.name)}">
              </label>
              <label>烘法策略
                <input data-batch="${index}" data-batch-field="strategy" value="${escapeHtml(batch.strategy)}">
              </label>
              <label>預計烘焙程度
                <input data-batch="${index}" data-batch-field="targetRoast" value="${escapeHtml(batch.targetRoast)}">
              </label>
              <label>實際烘焙度
                <input data-batch="${index}" data-batch-field="actualRoast" value="${escapeHtml(batch.actualRoast)}">
              </label>
              <label>生豆量 (g)
                <input data-batch="${index}" data-batch-field="greenWeight" value="${escapeHtml(batch.greenWeight)}" type="number" min="0" step="0.1" inputmode="decimal">
              </label>
              <label>烘後重量 (g)
                <input data-batch="${index}" data-batch-field="roastedWeight" value="${escapeHtml(batch.roastedWeight)}" type="number" min="0" step="0.1" inputmode="decimal">
              </label>
              <label>烘焙機
                <input data-batch="${index}" data-batch-field="roaster" value="${escapeHtml(batch.roaster)}">
              </label>
              <label>操作者
                <input data-batch="${index}" data-batch-field="operator" value="${escapeHtml(batch.operator)}">
              </label>
              <label class="span-2">火力策略
                <input data-batch="${index}" data-batch-field="heatPlan" value="${escapeHtml(batch.heatPlan)}">
              </label>
              <label>風門策略
                <input data-batch="${index}" data-batch-field="damperPlan" value="${escapeHtml(batch.damperPlan)}">
              </label>
              <label>轉速
                <input data-batch="${index}" data-batch-field="drumSpeed" value="${escapeHtml(batch.drumSpeed)}">
              </label>
            </div>
          </div>

          <div class="subsection">
            <div class="section-head" style="padding:0 0 12px;border-bottom:0;">
              <h3>30 秒詳細數據</h3>
              <button class="ghost add-row" type="button" data-add-log="${index}">＋ 新增 30 秒列</button>
            </div>
            <div class="table-scroll">
              <table class="log-table">
                <thead>
                  <tr><th>時間</th><th>溫度 (°C)</th><th>RoR</th><th>重要階段</th><th>階段精確時間</th><th>精確溫度</th><th>備註(火力 / 風門等)</th><th></th></tr>
                </thead>
                <tbody>
                  ${batch.logs.map((log, logIndex) => `
                    <tr class="${isAfterDrop(batch, log) ? "after-drop" : ""}">
                      <td><input data-log="${index}" data-index="${logIndex}" data-field="time" value="${escapeHtml(log.time)}" placeholder="mm:ss"></td>
                      <td><input data-log="${index}" data-index="${logIndex}" data-field="temp" value="${escapeHtml(log.temp)}" inputmode="decimal"></td>
                      <td><input data-ror="${index}" data-index="${logIndex}" value="${escapeHtml(getAutoRor(batch, logIndex))}" readonly tabindex="-1" aria-label="自動計算 RoR"></td>
                      <td>
                        <select data-log="${index}" data-index="${logIndex}" data-field="stage">
                          <option value=""></option>
                          ${milestoneNames.map((name) => `<option value="${escapeHtml(name)}" ${log.stage === name ? "selected" : ""}>${escapeHtml(name)}</option>`).join("")}
                        </select>
                      </td>
                      <td><input data-log="${index}" data-index="${logIndex}" data-field="stageTime" value="${escapeHtml(log.stageTime || "")}" placeholder="mm:ss"></td>
                      <td><input data-log="${index}" data-index="${logIndex}" data-field="exactTemp" value="${escapeHtml(log.exactTemp || log.exactTime || "")}" inputmode="decimal"></td>
                      <td><input data-log="${index}" data-index="${logIndex}" data-field="note" value="${escapeHtml(log.note)}"></td>
                      <td><button class="icon-button" type="button" data-delete-log="${index}" data-index="${logIndex}">×</button></td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </div>

          <div class="subsection">
            <h3>重要階段</h3>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr><th>階段</th><th>階段精確時間</th><th>精確溫度</th><th>溫度 (°C)</th><th>備註</th></tr>
                </thead>
                <tbody>
                  ${batch.milestones.map((milestone, milestoneIndex) => `
                    <tr>
                      <td>${escapeHtml(milestone.name)}</td>
                      <td><input data-milestone="${index}" data-index="${milestoneIndex}" data-field="time" value="${escapeHtml(milestone.time)}" placeholder="mm:ss"></td>
                      <td><input data-milestone="${index}" data-index="${milestoneIndex}" data-field="exactTemp" value="${escapeHtml(milestone.exactTemp || milestone.exactTime || "")}" inputmode="decimal"></td>
                      <td><input data-milestone="${index}" data-index="${milestoneIndex}" data-field="temp" value="${escapeHtml(milestone.temp)}" inputmode="decimal"></td>
                      <td><input data-milestone="${index}" data-index="${milestoneIndex}" data-field="note" value="${escapeHtml(milestone.note)}"></td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </div>

          <div class="subsection">
            <h3>單鍋烘焙曲線</h3>
            <svg class="single-chart" id="single-chart-${index}" viewBox="0 0 900 440" role="img" aria-label="${escapeHtml(batch.name || `第 ${index + 1} 鍋`)}單鍋烘焙曲線"></svg>
          </div>
        </div>
      `).join("");
    }

    function renderBatchCards() {
      batchCards.innerHTML = state.batches.map((batch, index) => `
        <div class="batch-card" style="--batch-color:${colors[index]}">
          <strong>${escapeHtml(batch.name || `第 ${index + 1} 鍋`)}</strong>
          <span>策略：${escapeHtml(batch.strategy || "未填寫")}</span>
          <span>損失率：${getLossRate(batch) ? `${getLossRate(batch)}%` : "--"}　發展：${getDevelopmentTime(batch)}　最高：${getHighestTemp(batch)}</span>
          <span>杯測：${escapeHtml(batch.cupping.score || "--")}　判斷：${escapeHtml(batch.cupping.judgement || "尚未填寫")}</span>
        </div>
      `).join("");
    }

    function getKeySummaryRows() {
      return [
        { label: "入豆溫度", value: (batch) => getStageTempText(batch, "入豆") },
        { label: "回溫點（時間 / 溫度）", value: (batch) => getStageTimeTempText(batch, "回溫點") },
        { label: "轉黃時間 / 溫度", value: (batch) => getStageTimeTempText(batch, "轉黃") },
        { label: "肉桂色時間 / 溫度", value: (batch) => getStageTimeTempText(batch, "肉桂色") },
        { label: "一爆開始時間 / 溫度", value: (batch) => getStageTimeTempText(batch, "一爆開始") },
        { label: "下豆時間 / 溫度", value: (batch) => getStageTimeTempText(batch, "下豆") },
        { label: "發展時間（自一爆起）", value: (batch) => getDevelopmentSummary(batch) },
        { label: "總烘焙時間", value: (batch) => formatDuration(getDropSeconds(batch)) },
        { label: "烘焙損失率", value: (batch) => getLossRate(batch) ? `${getLossRate(batch)}%` : "--" }
      ];
    }

    function getDurationSummaryRows() {
      return [
        { label: "回溫後到轉黃", value: (batch) => formatDuration(getDurationBetween(batch, "回溫點", "轉黃")) },
        { label: "脫水段（轉黃→肉桂色）", value: (batch) => formatDuration(getDurationBetween(batch, "轉黃", "肉桂色")) },
        { label: "梅納反應段（肉桂色→一爆）", value: (batch) => formatDuration(getDurationBetween(batch, "肉桂色", "一爆開始")) },
        { label: "一爆發展段（一爆→下豆）", value: (batch) => formatDuration(getDevelopmentSeconds(batch)) },
        { label: "總烘焙時間", value: (batch) => formatDuration(getDropSeconds(batch)) },
        { label: "轉黃點 RoR（回溫後）", value: (batch) => getRorNearStage(batch, "轉黃") },
        { label: "一爆前最低 RoR", value: (batch) => getLowestRorInRange(batch, "肉桂色", "一爆開始") },
        { label: "下豆前最低 RoR", value: (batch) => getLowestRorInRange(batch, "一爆開始", "下豆") }
      ];
    }

    function getDevelopmentCompareRows() {
      return [
        { label: "下豆溫度", value: (batch) => getStageTempText(batch, "下豆") },
        { label: "發展時間", value: (batch) => formatDuration(getDevelopmentSeconds(batch)) },
        { label: "發展時間占比", value: (batch) => getDevelopmentRatio(batch) || "--" },
        { label: "發展敘述", value: (_batch, index) => compareBySeconds(index, getDevelopmentSeconds, "時間最長", "居中", "時間最短") },
        { label: "發展溫度變化", value: (batch) => getTemperatureDevelopmentText(batch) },
        { label: "損失率", value: (batch) => getLossRate(batch) ? `${getLossRate(batch)}%` : "--" },
        { label: "整體時間長短", value: (_batch, index) => compareBySeconds(index, getDropSeconds, "最長", "居中", "最短") }
      ];
    }

    function buildSummaryRows(definitions) {
      return definitions.map((definition) => [
        definition.label,
        ...state.batches.map((batch, index) => definition.value(batch, index))
      ]);
    }

    function renderSummaryTable(title, definitions) {
      const headers = state.batches.map((batch, index) => `
        <div class="summary-cell" style="color:${colors[index]}">${escapeHtml(getBatchLabel(batch, index))}</div>
      `).join("");
      const rows = buildSummaryRows(definitions).map((row) => `
        <div class="summary-row">
          <div class="summary-cell">${escapeHtml(row[0])}</div>
          ${row.slice(1).map((value) => `<div class="summary-cell">${escapeHtml(value)}</div>`).join("")}
        </div>
      `).join("");
      return `
        <div class="summary-card">
          <h4>${escapeHtml(title)}</h4>
          <div class="summary-table-wrap">
            <div class="summary-list" role="table" aria-label="${escapeHtml(title)}">
              <div class="summary-row summary-head" role="row">
                <div class="summary-cell" role="columnheader">項目</div>${headers}
              </div>
              ${rows}
            </div>
          </div>
        </div>
      `;
    }

    function renderRoastSummary() {
      roastSummary.innerHTML = `
        <h3>每次烘焙自動總結</h3>
        <div class="summary-grid">
          ${renderSummaryTable("關鍵時間點與數據對比", getKeySummaryRows())}
          ${renderSummaryTable("各階段時間長度與 RoR", getDurationSummaryRows())}
          ${renderSummaryTable("下豆與發展表現對比", getDevelopmentCompareRows())}
        </div>
      `;
    }

    function renderCuppingTable() {
      cuppingBody.innerHTML = state.batches.map((batch, index) => `
        <tr>
          <td style="color:${colors[index]};font-weight:700;">${escapeHtml(batch.name || `第 ${index + 1} 鍋`)}</td>
          ${cuppingFields.map((field) => `
            <td>
              ${cuppingScoreFields.includes(field)
                ? `<select data-cupping="${index}" data-field="${field}">${scoreOptions(batch.cupping[field])}</select>`
                : `<input data-cupping="${index}" data-field="${field}" value="${escapeHtml(batch.cupping[field])}">`}
            </td>
          `).join("")}
        </tr>
      `).join("");
    }

    function getBatchPoints(batch) {
      return batch.logs
        .map((log) => ({
          time: parseTimeToSeconds(log.time),
          temp: Number(log.temp),
          note: log.stage || log.note
        }))
        .filter((point) => Number.isFinite(point.time) && Number.isFinite(point.temp) && point.temp > 0)
        .sort((a, b) => a.time - b.time);
    }

    function getChartEndTime(batch) {
      const dropTime = getMilestoneTime(batch, "下豆");
      if (Number.isFinite(dropTime) && dropTime > 0) return Math.min(dropTime, MAX_CHART_TIME);
      return MAX_CHART_TIME;
    }

    function isAfterDrop(batch, log) {
      const dropTime = getMilestoneTime(batch, "下豆");
      const time = parseTimeToSeconds(log?.time);
      return Number.isFinite(dropTime) && Number.isFinite(time) && time > dropTime;
    }

    function getExportLogs(batch) {
      return batch.logs.filter((log) => !isAfterDrop(batch, log));
    }

    function getChartPoints(batch) {
      const endTime = getChartEndTime(batch);
      return getBatchPoints(batch).filter((point) => point.time <= endTime);
    }

    function getRorPoints(batch) {
      const endTime = getChartEndTime(batch);
      return batch.logs
        .map((log, index) => ({
          time: parseTimeToSeconds(log.time),
          ror: Number(getAutoRor(batch, index))
        }))
        .filter((point) => Number.isFinite(point.time) && point.time <= endTime && Number.isFinite(point.ror))
        .sort((a, b) => a.time - b.time);
    }

    function getStagePoint(batch, stageName) {
      const log = batch.logs.find((item) => item.stage === stageName);
      if (log) {
        const time = parseTimeToSeconds(log.stageTime || log.time);
        const temp = Number(log.exactTemp || log.exactTime || log.temp);
        if (Number.isFinite(time)) {
          return { time, temp: Number.isFinite(temp) && temp > 0 ? temp : null };
        }
      }
      const milestone = batch.milestones.find((item) => item.name === stageName);
      const time = parseTimeToSeconds(milestone?.time);
      const temp = Number(milestone?.exactTemp || milestone?.exactTime || milestone?.temp);
      return Number.isFinite(time) ? { time, temp: Number.isFinite(temp) && temp > 0 ? temp : null } : null;
    }

    function renderStageAnnotations(series, xScale, top, plotHeight, left, rightLimit, compact = false) {
      const stages = milestoneNames
        .filter((name) => name !== "入豆")
        .map((name) => ({
          name,
          entries: series
            .map(({ batch, index }) => ({ batch, index, point: getStagePoint(batch, name) }))
            .filter((entry) => entry.point)
        }))
        .filter((stage) => stage.entries.length);

      const positionedStages = stages.map((stage) => {
        const avgTime = stage.entries.reduce((sum, entry) => sum + entry.point.time, 0) / stage.entries.length;
        const x = Math.max(left + 44, Math.min(rightLimit - 44, xScale(avgTime)));
        return { ...stage, x, labelX: x };
      });
      const minGap = compact ? 92 : 118;
      for (let index = 1; index < positionedStages.length; index += 1) {
        positionedStages[index].labelX = Math.max(positionedStages[index].labelX, positionedStages[index - 1].labelX + minGap);
      }
      for (let index = positionedStages.length - 2; index >= 0; index -= 1) {
        positionedStages[index].labelX = Math.min(positionedStages[index].labelX, positionedStages[index + 1].labelX - minGap);
      }

      return positionedStages.map((stage, stageIndex) => {
        const x = Math.max(left + 44, Math.min(rightLimit - 44, stage.x));
        const labelX = Math.max(left + 44, Math.min(rightLimit - 44, stage.labelX));
        const titleY = top - (compact ? 62 : 78) + (stageIndex % 2) * (compact ? 38 : 46);
        const detailStartY = titleY + 17;
        const rows = stage.entries.map((entry, rowIndex) => {
          const temp = entry.point.temp == null ? "" : ` / ${entry.point.temp.toFixed(entry.point.temp % 1 ? 1 : 0)}°`;
          return `<text x="${labelX.toFixed(1)}" y="${(detailStartY + rowIndex * (compact ? 13 : 14)).toFixed(1)}" text-anchor="middle" fill="${colors[entry.index]}" font-size="${compact ? 11 : 13}" font-weight="700" paint-order="stroke" stroke="#fff" stroke-width="4">${escapeHtml(formatDuration(entry.point.time) + temp)}</text>`;
        }).join("");

        return `
          <line x1="${x.toFixed(1)}" y1="${top}" x2="${x.toFixed(1)}" y2="${top + plotHeight}" stroke="#98a2b3" stroke-width="1" stroke-dasharray="4 4"></line>
          ${Math.abs(labelX - x) > 1 ? `<line x1="${x.toFixed(1)}" y1="${(top - 5).toFixed(1)}" x2="${labelX.toFixed(1)}" y2="${(titleY + 4).toFixed(1)}" stroke="#c7b8a5" stroke-width="1"></line>` : ""}
          <text x="${labelX.toFixed(1)}" y="${titleY.toFixed(1)}" text-anchor="middle" fill="#111827" font-size="${compact ? 12 : 14}" font-weight="800" paint-order="stroke" stroke="#fff" stroke-width="5">${escapeHtml(stage.name)}</text>
          ${rows}
        `;
      }).join("");
    }

    function renderNoteAnnotations(series, xScale, yScale, top, plotBottom, compact = false) {
      const fontSize = compact ? 10 : 12;
      const lineHeight = compact ? 14 : 17;
      const labelTop = plotBottom + (compact ? 20 : 22);
      const minX = 78;
      const maxX = 900;
      const lanes = [];
      const items = series.flatMap(({ batch, index }) => batch.logs
        .map((log) => ({
          time: parseTimeToSeconds(log.time),
          temp: Number(log.temp),
          note: String(log.note || "").trim(),
          index
        }))
        .filter((item) => item.note && Number.isFinite(item.time) && Number.isFinite(item.temp) && item.temp > 0 && !isAfterDrop(batch, { time: formatDuration(item.time) }))
      ).sort((a, b) => a.time - b.time || a.index - b.index);

      return items.map((item) => {
        const x = xScale(item.time);
        const estimatedWidth = Math.max(34, Math.min(140, item.note.length * fontSize * 0.72));
        const preferredX = Math.max(minX, Math.min(x + 8, maxX - estimatedWidth));
        const laneIndex = lanes.findIndex((lastRight) => preferredX >= lastRight + 12);
        const lane = laneIndex >= 0 ? laneIndex : lanes.length;
        const labelX = laneIndex >= 0 || !lanes.length ? preferredX : Math.max(minX, Math.min(Math.min(...lanes) + 12, maxX - estimatedWidth));
        lanes[lane] = labelX + estimatedWidth;
        const labelY = labelTop + lane * lineHeight;
        return `
          <line x1="${x.toFixed(1)}" y1="${plotBottom.toFixed(1)}" x2="${x.toFixed(1)}" y2="${(plotBottom + 8).toFixed(1)}" stroke="${colors[item.index]}" stroke-width="1.5" opacity="0.75"></line>
          <text x="${labelX.toFixed(1)}" y="${labelY.toFixed(1)}" fill="${colors[item.index]}" font-size="${fontSize}" font-weight="800" paint-order="stroke" stroke="#fff" stroke-width="5">${escapeHtml(item.note)}</text>
        `;
      }).join("");
    }

    function renderChart() {
      const series = state.batches
        .map((batch, index) => ({ batch, index, points: getChartPoints(batch), endTime: getChartEndTime(batch) }))
        .filter((item) => item.batch.enabled && item.points.length >= 2);

      const width = 980;
      const height = 540;
      const left = 68;
      const right = 34;
      const top = 178;
      const bottom = 100;
      const plotWidth = width - left - right;
      const plotHeight = height - top - bottom;

      chart.innerHTML = `
        <rect x="0" y="0" width="${width}" height="${height}" fill="#fff"></rect>
        <text x="${left}" y="26" fill="#344054" font-size="19" font-weight="700">同豆多鍋烘焙曲線疊圖</text>
        <text x="${width - right}" y="26" text-anchor="end" fill="#66737f" font-size="13">橫軸：時間　縱軸：豆溫 °C</text>
      `;

      if (!series.length) {
        chart.innerHTML += `<text x="${width / 2}" y="${height / 2}" text-anchor="middle" fill="#66737f" font-size="18">至少輸入一鍋兩筆以上時間與溫度，就能比較曲線</text>`;
        return;
      }

      const allPoints = series.flatMap((item) => item.points);
      const allRorPoints = series.flatMap((item) => getRorPoints(item.batch));
      const maxTime = Math.min(Math.max(...series.map((item) => item.endTime), 60), MAX_CHART_TIME);
      const minTemp = Math.floor((Math.min(...allPoints.map((point) => point.temp), 80) - 10) / 10) * 10;
      const maxTemp = Math.ceil((Math.max(...allPoints.map((point) => point.temp), 220) + 10) / 10) * 10;
      const minRor = Math.min(0, Math.floor((Math.min(...allRorPoints.map((point) => point.ror), 0) - 2) / 2) * 2);
      const maxRor = Math.max(10, Math.ceil((Math.max(...allRorPoints.map((point) => point.ror), 10) + 2) / 2) * 2);
      const xScale = (time) => left + (time / Math.max(maxTime, 1)) * plotWidth;
      const yScale = (temp) => top + plotHeight - ((temp - minTemp) / Math.max(maxTemp - minTemp, 1)) * plotHeight;
      const rorYScale = (ror) => top + plotHeight - ((ror - minRor) / Math.max(maxRor - minRor, 1)) * plotHeight;
      const yStep = maxTemp - minTemp > 120 ? 40 : 20;
      const rorStep = maxRor - minRor > 18 ? 4 : 2;
      const xStep = maxTime > 900 ? 180 : 120;

      for (let temp = minTemp; temp <= maxTemp; temp += yStep) {
        const y = yScale(temp);
        chart.innerHTML += `
          <line x1="${left}" y1="${y.toFixed(1)}" x2="${width - right}" y2="${y.toFixed(1)}" stroke="#e2e8f0"></line>
          <text x="${left - 12}" y="${(y + 4).toFixed(1)}" text-anchor="end" fill="#66737f" font-size="13">${temp}</text>
        `;
      }

      for (let time = 0; time <= maxTime; time += xStep) {
        const x = xScale(time);
        chart.innerHTML += `
          <line x1="${x.toFixed(1)}" y1="${top}" x2="${x.toFixed(1)}" y2="${top + plotHeight}" stroke="#eef2f6"></line>
          <text x="${x.toFixed(1)}" y="${height - 30}" text-anchor="middle" fill="#66737f" font-size="13">${formatDuration(time)}</text>
        `;
      }

      for (let ror = minRor; ror <= maxRor; ror += rorStep) {
        const y = rorYScale(ror);
        chart.innerHTML += `<text x="${width - right + 8}" y="${(y + 4).toFixed(1)}" fill="#475467" font-size="12">${ror}</text>`;
      }

      chart.innerHTML += `
        <line x1="${left}" y1="${top + plotHeight}" x2="${width - right}" y2="${top + plotHeight}" stroke="#98a2b3" stroke-width="1.5"></line>
        <line x1="${left}" y1="${top}" x2="${left}" y2="${top + plotHeight}" stroke="#98a2b3" stroke-width="1.5"></line>
        <line x1="${width - right}" y1="${top}" x2="${width - right}" y2="${top + plotHeight}" stroke="#98a2b3" stroke-width="1.5"></line>
        <text x="${left}" y="${height - 10}" fill="#475467" font-size="14">時間</text>
        <text x="16" y="${top + 4}" fill="#475467" font-size="14">°C</text>
        <text x="${width - 8}" y="${top + 4}" text-anchor="end" fill="#475467" font-size="14">RoR</text>
      `;

      series.forEach(({ batch, index }) => {
        chart.innerHTML += `
          <circle cx="${left + index * 150}" cy="56" r="5" fill="${colors[index]}"></circle>
          <text x="${left + 12 + index * 150}" y="60" fill="#344054" font-size="13">${escapeHtml(batch.name)}</text>
        `;
      });

      chart.innerHTML += renderStageAnnotations(series, xScale, top, plotHeight, left, width - right);

      series.forEach(({ batch, index, points }) => {
        const path = points
          .map((point, pointIndex) => `${pointIndex === 0 ? "M" : "L"} ${xScale(point.time).toFixed(1)} ${yScale(point.temp).toFixed(1)}`)
          .join(" ");
        chart.innerHTML += `<path d="${path}" fill="none" stroke="${colors[index]}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>`;
        points.forEach((point, pointIndex) => {
          const x = xScale(point.time);
          const y = yScale(point.temp);
          chart.innerHTML += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="6.5" fill="${colors[index]}" stroke="#fff" stroke-width="2.2"></circle>`;
        });
        const rorPoints = getRorPoints(batch);
        if (rorPoints.length >= 2) {
          const rorPath = rorPoints
            .map((point, pointIndex) => `${pointIndex === 0 ? "M" : "L"} ${xScale(point.time).toFixed(1)} ${rorYScale(point.ror).toFixed(1)}`)
            .join(" ");
          chart.innerHTML += `<path d="${rorPath}" fill="none" stroke="${colors[index]}" stroke-width="2.5" stroke-dasharray="8 6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"></path>`;
        }
      });
      chart.innerHTML += renderNoteAnnotations(series, xScale, yScale, top, top + plotHeight);
      chart.innerHTML += `<text x="${width - right - 8}" y="56" text-anchor="end" fill="#475467" font-size="12">實線=豆溫　虛線=RoR</text>`;
    }

    function renderSingleBatchCharts() {
      state.batches.forEach((batch, index) => {
        const svg = document.querySelector(`#single-chart-${index}`);
        if (!svg) return;

        const points = getChartPoints(batch);
        const width = 900;
        const height = 440;
        const left = 66;
        const right = 32;
        const top = 118;
        const bottom = 90;
        const plotWidth = width - left - right;
        const plotHeight = height - top - bottom;
        const color = colors[index];

        svg.innerHTML = `
          <rect x="0" y="0" width="${width}" height="${height}" fill="#fff"></rect>
          <text x="${left}" y="26" fill="#344054" font-size="18" font-weight="700">單鍋曲線</text>
          <text x="${width - right}" y="26" text-anchor="end" fill="#66737f" font-size="13">豆溫 °C / 時間</text>
        `;

        if (points.length < 2) {
          svg.innerHTML += `<text x="${width / 2}" y="${height / 2}" text-anchor="middle" fill="#66737f" font-size="17">輸入至少兩筆時間與溫度後顯示單鍋曲線</text>`;
          return;
        }

        const maxTime = Math.min(Math.max(getChartEndTime(batch), 60), MAX_CHART_TIME);
        const minTemp = Math.floor((Math.min(...points.map((point) => point.temp), 80) - 10) / 10) * 10;
        const maxTemp = Math.ceil((Math.max(...points.map((point) => point.temp), 220) + 10) / 10) * 10;
        const rorPoints = getRorPoints(batch);
        const minRor = Math.min(0, Math.floor((Math.min(...rorPoints.map((point) => point.ror), 0) - 2) / 2) * 2);
        const maxRor = Math.max(10, Math.ceil((Math.max(...rorPoints.map((point) => point.ror), 10) + 2) / 2) * 2);
        const xScale = (time) => left + (time / Math.max(maxTime, 1)) * plotWidth;
        const yScale = (temp) => top + plotHeight - ((temp - minTemp) / Math.max(maxTemp - minTemp, 1)) * plotHeight;
        const rorYScale = (ror) => top + plotHeight - ((ror - minRor) / Math.max(maxRor - minRor, 1)) * plotHeight;
        const yStep = maxTemp - minTemp > 120 ? 40 : 20;
        const rorStep = maxRor - minRor > 18 ? 4 : 2;
        const xStep = maxTime > 900 ? 180 : 120;

        for (let temp = minTemp; temp <= maxTemp; temp += yStep) {
          const y = yScale(temp);
          svg.innerHTML += `
            <line x1="${left}" y1="${y.toFixed(1)}" x2="${width - right}" y2="${y.toFixed(1)}" stroke="#e2e8f0"></line>
            <text x="${left - 12}" y="${(y + 4).toFixed(1)}" text-anchor="end" fill="#66737f" font-size="13">${temp}</text>
          `;
        }

        for (let time = 0; time <= maxTime; time += xStep) {
          const x = xScale(time);
          svg.innerHTML += `
            <line x1="${x.toFixed(1)}" y1="${top}" x2="${x.toFixed(1)}" y2="${top + plotHeight}" stroke="#eef2f6"></line>
            <text x="${x.toFixed(1)}" y="${height - 28}" text-anchor="middle" fill="#66737f" font-size="13">${formatDuration(time)}</text>
          `;
        }

        for (let ror = minRor; ror <= maxRor; ror += rorStep) {
          const y = rorYScale(ror);
          svg.innerHTML += `<text x="${width - right + 8}" y="${(y + 4).toFixed(1)}" fill="#475467" font-size="12">${ror}</text>`;
        }

        svg.innerHTML += `
          <line x1="${left}" y1="${top + plotHeight}" x2="${width - right}" y2="${top + plotHeight}" stroke="#98a2b3" stroke-width="1.5"></line>
          <line x1="${left}" y1="${top}" x2="${left}" y2="${top + plotHeight}" stroke="#98a2b3" stroke-width="1.5"></line>
          <line x1="${width - right}" y1="${top}" x2="${width - right}" y2="${top + plotHeight}" stroke="#98a2b3" stroke-width="1.5"></line>
          <text x="${left}" y="${height - 9}" fill="#475467" font-size="14">時間</text>
          <text x="16" y="${top + 4}" fill="#475467" font-size="14">°C</text>
          <text x="${width - 8}" y="${top + 4}" text-anchor="end" fill="#475467" font-size="14">RoR</text>
        `;

        svg.innerHTML += renderStageAnnotations([{ batch, index, points }], xScale, top, plotHeight, left, width - right, true);

        const path = points
          .map((point, pointIndex) => `${pointIndex === 0 ? "M" : "L"} ${xScale(point.time).toFixed(1)} ${yScale(point.temp).toFixed(1)}`)
          .join(" ");

        svg.innerHTML += `<path d="${path}" fill="none" stroke="${color}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>`;
        points.forEach((point, pointIndex) => {
          const x = xScale(point.time);
          const y = yScale(point.temp);
          svg.innerHTML += `
            <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="6.5" fill="${color}" stroke="#fff" stroke-width="2.2"></circle>
          `;
        });
        if (rorPoints.length >= 2) {
          const rorPath = rorPoints
            .map((point, pointIndex) => `${pointIndex === 0 ? "M" : "L"} ${xScale(point.time).toFixed(1)} ${rorYScale(point.ror).toFixed(1)}`)
            .join(" ");
          svg.innerHTML += `<path d="${rorPath}" fill="none" stroke="${color}" stroke-width="2.5" stroke-dasharray="8 6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"></path>`;
          svg.innerHTML += `<text x="${width - right - 8}" y="${height - 9}" text-anchor="end" fill="#475467" font-size="12">實線=豆溫　虛線=RoR</text>`;
        }
        svg.innerHTML += renderNoteAnnotations([{ batch, index, points }], xScale, yScale, top, top + plotHeight, true);
      });
    }

    function renderAll() {
      renderBeanFields();
      renderChartToggles();
      renderBatchTabs();
      renderBatchPanels();
      renderCuppingTable();
      renderBatchCards();
      renderRoastSummary();
      renderChart();
      renderSingleBatchCharts();
      renderHistoryList();
    }

    function getHistoryRecords() {
      try {
        const records = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        return Array.isArray(records) ? records : [];
      } catch {
        return [];
      }
    }

    function setHistoryRecords(records) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(records));
    }

    function getRecordTitle(recordState = state) {
      const date = recordState.bean?.date || today();
      const bean = recordState.bean?.beanItem || "未命名豆子";
      return `${date} ${bean}`;
    }

    function handleSaveRecord() {
      const records = getHistoryRecords();
      const now = new Date();
      const record = {
        id: `${now.getTime()}`,
        title: getRecordTitle(),
        savedAt: now.toISOString(),
        state: JSON.parse(JSON.stringify(state))
      };
      records.unshift(record);
      setHistoryRecords(records.slice(0, 30));
      renderHistoryList();
      status.textContent = "已保存本次紀錄，可從「查看前次紀錄」載入。";
    }

    function renderHistoryList() {
      const list = document.querySelector("#history-list");
      if (!list) return;
      const records = getHistoryRecords();
      if (!records.length) {
        list.innerHTML = `<div class="history-item"><div><div class="history-title">尚無已保存紀錄</div><div class="history-meta">完成一次烘焙後按「保存本次紀錄」，下次就能從這裡載入。</div></div></div>`;
        return;
      }
      list.innerHTML = records.map((record) => {
        const savedAt = record.savedAt ? new Date(record.savedAt).toLocaleString("zh-TW", { hour12: false }) : "";
        return `
          <div class="history-item">
            <div>
              <div class="history-title">${escapeHtml(record.title || getRecordTitle(record.state))}</div>
              <div class="history-meta">保存時間：${escapeHtml(savedAt)}</div>
            </div>
            <button class="secondary" type="button" data-load-record="${escapeHtml(record.id)}">載入</button>
          </div>
        `;
      }).join("");
    }

    function handleToggleHistory() {
      const panel = document.querySelector("#history-panel");
      if (!panel) return;
      panel.classList.toggle("active");
      renderHistoryList();
      if (panel.classList.contains("active")) {
        panel.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function handleLoadRecord(id) {
      const record = getHistoryRecords().find((item) => item.id === id);
      if (!record) return;
      if (!window.confirm("載入前次紀錄會取代目前畫面上的暫存內容，確定要載入嗎？")) return;
      state = record.state;
      state.activeBatch = 0;
      renderAll();
      save();
      status.textContent = `已載入：${record.title || getRecordTitle(record.state)}`;
    }

    function handleClearData() {
      if (!window.confirm("確定要清除所有數據嗎？這會清空這份試烘比較紀錄。")) return;
      state = createState();
      renderAll();
      save();
      status.textContent = "已清除目前紀錄。";
    }

    function handleExportCSV() {
      let rows = `<tr><td class="title" colspan="10">烘豆曲線紀錄</td></tr>`;
      rows += xlsSection("豆子與試烘目標", ["項目", "內容"], [
        ["試烘日期", state.bean.date],
        ["生豆品項", state.bean.beanItem],
        ["處理法", state.bean.process],
        ["假設條件", state.bean.hypothesis]
      ]);
      rows += xlsSection("關鍵時間點與數據對比", ["項目", ...state.batches.map(getBatchLabel)], buildSummaryRows(getKeySummaryRows()));
      rows += xlsSection("各階段時間長度與 RoR", ["項目", ...state.batches.map(getBatchLabel)], buildSummaryRows(getDurationSummaryRows()));
      rows += xlsSection("下豆與發展表現對比", ["項目", ...state.batches.map(getBatchLabel)], buildSummaryRows(getDevelopmentCompareRows()));

      state.batches.forEach((batch, index) => {
        rows += xlsSection(`${batch.name || `第 ${index + 1} 鍋`} 烘法設定`, ["項目", "內容"], [
          ["烘法策略", batch.strategy],
          ["預計烘焙程度", batch.targetRoast],
          ["實際烘焙度", batch.actualRoast],
          ["生豆量 (g)", batch.greenWeight],
          ["烘後重量 (g)", batch.roastedWeight],
          ["損失率 (%)", getLossRate(batch)],
          ["發展時間", getDevelopmentTime(batch)],
          ["最高紀錄溫度", getHighestTemp(batch)],
          ["火力策略", batch.heatPlan],
          ["風門策略", batch.damperPlan],
          ["轉速", batch.drumSpeed],
          ["烘焙機", batch.roaster],
          ["操作者", batch.operator]
        ], index);

        syncMilestonesFromLogs(batch);
        rows += xlsSection("30 秒詳細數據", ["時間", "溫度(°C)", "RoR", "重要階段", "階段精確時間", "精確溫度", "備註"],
          getExportLogs(batch).map((log) => [log.time, log.temp, getAutoRor(batch, batch.logs.indexOf(log)), log.stage, log.stageTime, log.exactTemp || log.exactTime, log.note]),
          index
        );

        rows += xlsSection("重要階段", ["階段", "階段精確時間", "精確溫度", "溫度(°C)", "備註"],
          batch.milestones.map((milestone) => [milestone.name, milestone.time, milestone.exactTemp || milestone.exactTime, milestone.temp, milestone.note])
          , index);
      });

      rows += xlsSection("杯測比較", ["鍋次", "乾香/濕香", "酸質", "甜感", "醇厚度", "餘韻", "整體分數", "判斷"],
        state.batches.map((batch) => [batch.name, ...cuppingFields.map((field) => batch.cupping[field])])
      );
      const winner = state.decision.winner === "" ? "" : state.batches[Number(state.decision.winner)]?.name;
      rows += xlsSection("結論", ["項目", "內容"], [["最適合烘法", winner], ["結論與下次調整", state.decision.conclusion]]);
      const safeBeanItem = (state.bean.beanItem || "未命名").replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_").slice(0, 40);
      downloadWorkbook(`試烘比較_${(state.bean.date || today()).replace(/-/g, "")}_${safeBeanItem}.xls`, rows);
      status.textContent = "已匯出 Excel 表格。";
    }

    document.addEventListener("input", (event) => {
      const field = event.target.dataset.field;
      if (field?.startsWith("bean.")) {
        state.bean[field.split(".")[1]] = event.target.value;
        save();
        return;
      }
      if (field?.startsWith("decision.")) {
        state.decision[field.split(".")[1]] = event.target.value;
        save();
        return;
      }
      if (event.target.dataset.batchField) {
        const index = Number(event.target.dataset.batch);
        state.batches[index][event.target.dataset.batchField] = event.target.value;
        renderBatchTabs();
        save();
        return;
      }
      if (event.target.dataset.milestone) {
        const batchIndex = Number(event.target.dataset.milestone);
        const milestoneIndex = Number(event.target.dataset.index);
        state.batches[batchIndex].milestones[milestoneIndex][event.target.dataset.field] = event.target.value;
        save();
        return;
      }
      if (event.target.dataset.log) {
        const batchIndex = Number(event.target.dataset.log);
        const logIndex = Number(event.target.dataset.index);
        state.batches[batchIndex].logs[logIndex][event.target.dataset.field] = event.target.value;
        syncLogStageTime(state.batches[batchIndex], logIndex);
        save();
        return;
      }
      if (event.target.dataset.cupping) {
        const batchIndex = Number(event.target.dataset.cupping);
        state.batches[batchIndex].cupping[event.target.dataset.field] = event.target.value;
        save();
      }
    });

    document.addEventListener("change", (event) => {
      if (event.target.dataset.log) {
        const batchIndex = Number(event.target.dataset.log);
        const logIndex = Number(event.target.dataset.index);
        state.batches[batchIndex].logs[logIndex][event.target.dataset.field] = event.target.value;
        syncLogStageTime(state.batches[batchIndex], logIndex);
        renderBatchPanels();
        save();
        return;
      }
      if (event.target.dataset.cupping) {
        const batchIndex = Number(event.target.dataset.cupping);
        state.batches[batchIndex].cupping[event.target.dataset.field] = event.target.value;
        save();
        return;
      }
      if (event.target.dataset.batchEnabled) {
        state.batches[Number(event.target.dataset.batchEnabled)].enabled = event.target.checked;
        save();
      }
    });

    document.addEventListener("click", (event) => {
      const tab = event.target.closest("[data-tab]");
      if (tab) {
        state.activeBatch = Number(tab.dataset.tab);
        renderBatchTabs();
        renderBatchPanels();
        renderSingleBatchCharts();
        return;
      }

      const addLog = event.target.closest("[data-add-log]");
      if (addLog) {
        const index = Number(addLog.dataset.addLog);
        const batch = state.batches[index];
        const nextTime = getNextLogTime(batch);
        if (!nextTime) {
          status.textContent = "已到 13:00，不再新增時間列。";
          return;
        }
        batch.logs.push({ time: nextTime, temp: "", ror: "", stage: "", stageTime: "", exactTemp: "", note: "" });
        renderBatchPanels();
        renderSingleBatchCharts();
        save();
        return;
      }

      const deleteLog = event.target.closest("[data-delete-log]");
      if (deleteLog) {
        const batchIndex = Number(deleteLog.dataset.deleteLog);
        const logIndex = Number(deleteLog.dataset.index);
        if (state.batches[batchIndex].logs.length <= 1) return;
        state.batches[batchIndex].logs.splice(logIndex, 1);
        renderBatchPanels();
        renderSingleBatchCharts();
        save();
        return;
      }

      const loadRecord = event.target.closest("[data-load-record]");
      if (loadRecord) {
        handleLoadRecord(loadRecord.dataset.loadRecord);
      }
    });

    document.querySelector("#save-record-button").addEventListener("click", handleSaveRecord);
    document.querySelector("#history-toggle-button").addEventListener("click", handleToggleHistory);
    document.querySelector("#clear-button").addEventListener("click", handleClearData);
    document.querySelector("#export-button").addEventListener("click", handleExportCSV);
    document.querySelector("#print-button").addEventListener("click", () => window.print());

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }

    load();
    renderAll();
  </script>
</body>
</html>
